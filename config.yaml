version: 1.3.9
cache: true

endpoints:
  openAI:
    disabled: true
  assistants:
    disabled: true
  google:
    disabled: true
  anthropic:
    disabled: true
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "openrouter/auto"
        fetch: true
      titleConvo: true
      titleModel: "openrouter/auto"
      dropParams: ['stop']
      modelDisplayLabel: "OpenRouter"

memory:
  disabled: false
  validKeys: ["preferences", "context", "facts"]
  tokenLimit: 3000
  personalize: true
  messageWindowSize: 10
  agent:
    id: "agent_IMNJDCNUE5pqNWsLuKWnV"

mcpServers:
  homeassistant:
    type: streamable-http
    url: "${HASS_URL}/api/mcp"
    headers:
      Authorization: "Bearer ${HASS_TOKEN}"
