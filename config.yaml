version: 1.1.7
cache: true

endpoints:
  openAI:
    disabled: true
  assistants:
    disabled: true
  azureOpenAI:
    disabled: true
  google:
    disabled: true
  anthropic:
    disabled: true
  gptPlugins:
    disabled: true
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "openrouter/auto"
        fetch: true
      titleConversation: true
      titleModel: "openrouter/auto"
      modelDisplayLabel: "OpenRouter"

mcpServers:
  homeassistant:
    type: sse
    url: "${HASS_URL}/api/mcp/sse"
    headers:
      Authorization: "Bearer ${HASS_TOKEN}"
